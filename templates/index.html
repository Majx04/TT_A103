<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EMG Monitor Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    background: radial-gradient(circle at 20% 20%, #0f2027, #0b121a 60%);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
}

/* ===== HEADER ===== */

.header {
    text-align: center;
    margin-bottom: 30px;
}

.header h2 {
    font-weight: 600;
    letter-spacing: 2px;
}

/* ===== LED STATUS ===== */

.led {
    height: 14px;
    width: 14px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    box-shadow: 0 0 10px currentColor;
    animation: pulse 1.5s infinite;
}

.led-activo {
    background: #00ff88;
    color: #00ff88;
}

.led-pausado {
    background: #ff4d4d;
    color: #ff4d4d;
}

@keyframes pulse {
    0% { box-shadow: 0 0 5px currentColor; }
    50% { box-shadow: 0 0 20px currentColor; }
    100% { box-shadow: 0 0 5px currentColor; }
}

/* ===== CARDS ===== */

.card-glass {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: 0 0 30px rgba(0,255,150,0.05);
}

/* ===== METRIC BOX ===== */

.metric-box {
    text-align: center;
    padding: 20px;
}

.metric-box h3 {
    font-weight: 600;
    color: #00ffcc;
}

.metric-box p {
    font-size: 0.9rem;
    color: #aaa;
}

/* ===== BUTTONS ===== */

.btn-pro {
    border-radius: 40px;
    padding: 10px 25px;
    font-weight: 500;
    transition: 0.3s;
}

.btn-pro:hover {
    transform: translateY(-2px);
}

/* ===== CHART ===== */

canvas {
    background: transparent;
}

</style>
</head>

<body>

<div class="container mt-4">

    <div class="header">
        <h2>🧠 EMG Monitor Pro</h2>
        <div id="estadoContainer">
            <span id="led" class="led led-activo"></span>
            <span id="estadoTexto">Adquisición activa</span>
        </div>
    </div>

    <!-- MÉTRICAS -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card card-glass metric-box">
                <h3 id="rms">0.00</h3>
                <p>RMS</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-glass metric-box">
                <h3 id="pico">0.00</h3>
                <p>Pico Máximo</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-glass metric-box">
                <h3 id="media">0.00</h3>
                <p>Media</p>
            </div>
        </div>
    </div>

    <!-- CONTROLES -->
    <div class="card card-glass p-4 mb-4">
        <div class="row align-items-center">
            <div class="col-md-4">
                <input type="text" id="nombre" class="form-control"
                       placeholder="Nombre base (ej: sujeto1)">
            </div>
            <div class="col-md-8 text-end">
                <button onclick="togglePausa()" class="btn btn-warning btn-pro me-2">
                    ⏸ Pausar
                </button>
                <button onclick="guardar()" class="btn btn-success btn-pro">
                    💾 Guardar
                </button>
            </div>
        </div>
    </div>

    <!-- GRÁFICA -->
    <div class="card card-glass p-4">
        <canvas id="grafica" height="120"></canvas>
    </div>

</div>

<script>

let pausado = false;

const ctx = document.getElementById('grafica').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: Array(5000).fill(""),
        datasets: [{
            label: 'Señal EMG',
            data: Array(5000).fill(0),
            borderColor: '#00ffcc',
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.25
        }]
    },
    options: {
        responsive: true,
        animation: false,
        plugins: { legend: { display: false } },
        scales: {
            x: { display: false },
            y: {
                min: 0,
                max: 4,
                grid: { color: 'rgba(255,255,255,0.05)' },
                ticks: { color: '#aaa' }
            }
        }
    }
});

function calcularMetricas(datos) {
    const rms = Math.sqrt(datos.reduce((a,b)=>a+b*b,0)/datos.length);
    const pico = Math.max(...datos);
    const media = datos.reduce((a,b)=>a+b,0)/datos.length;

    document.getElementById("rms").innerText = rms.toFixed(3);
    document.getElementById("pico").innerText = pico.toFixed(3);
    document.getElementById("media").innerText = media.toFixed(3);
}

function actualizarGrafica() {
    fetch("/datos")
        .then(res => res.json())
        .then(datos => {
            chart.data.datasets[0].data = datos;
            chart.update();
            calcularMetricas(datos);
        });
}

setInterval(actualizarGrafica, 100);

function togglePausa() {
    fetch("/pausa", { method: "POST" })
        .then(res => res.json())
        .then(data => {
            pausado = data.pausado;

            const led = document.getElementById("led");
            const texto = document.getElementById("estadoTexto");

            if (pausado) {
                led.className = "led led-pausado";
                texto.innerText = "PAUSADO";
            } else {
                led.className = "led led-activo";
                texto.innerText = "Adquisición activa";
            }
        });
}

function guardar() {
    const nombre = document.getElementById("nombre").value;

    fetch("/guardar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre: nombre })
    })
    .then(res => res.json())
    .then(data => alert(data.mensaje || data.error));
}

</script>

</body>
</html>
