<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT A-103</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='adquisicion.css') }}">
</head>

<body>
    <header class="navbar">
        <div class="logo"><strong></strong></div>
        <nav class="menu">
            <a href="{{ url_for('home') }}">Inicio</a>
            <a href="{{ url_for('logout') }}">Cerrar Sesión</a>
        </nav>
    </header>

    <div class="container">
        <main class="main">
            <div class="top-row">
                <div class="card card-status">
                    <div id="estado" class="estado activo">
                        ● Adquisición activa
                    </div>
                </div>

                <div class="card card-controls">
                    <input type="text" id="nombre" placeholder="Nombre de muestra">

                    <button id="btnPausa" class="btn-primary" onclick="toggleEMG()">
                        Pausar
                    </button>

                    <button id="btnGuardar" class="btn-danger" onclick="guardarEMG()" disabled>
                        Guardar
                    </button>
                </div>
            </div>

            <div class="card chart-container">
                <canvas id="grafica"></canvas>
            </div>
        </main>
    </div>

    <footer class="footer">
        © 2026 TT A - 103. Todos los derechos reservados.
    </footer>

    <script src="{{ url_for('static', filename='js/adquisicion.js') }}"></script>
</body>
</html>
